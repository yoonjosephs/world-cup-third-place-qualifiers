name: Update World Cup standings

on:
  schedule:
    # Every 5 minutes is the fastest interval GitHub Actions' schedule
    # trigger accepts (anything tighter, including "every minute", silently
    # collapses to this same floor) — but in practice the free scheduler
    # doesn't honor it reliably: expect hours of cold-start delay before
    # the first run, and multi-hour gaps between runs after that under
    # platform load, not a steady 5 minutes. That's a GitHub-side
    # limitation, not a bug here — see README "Live data pipeline" for the
    # observed timeline and workaround options (manual dispatch / an
    # external scheduler hitting the workflow_dispatch API). Still only
    # ~288 calls/day even if it ran exactly on schedule, nowhere near
    # football-data.org's 10-requests/minute cap. Group stage runs through
    # 2026-06-27; this workflow is cheap to leave running after that too
    # (it no-ops once standings stop changing — see the "no change" branch
    # in scripts/import-standings.mjs), but feel free to delete/disable
    # this schedule once the bracket locks.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-standings
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Fetch + validate + write data/standings.json
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: node scripts/import-standings.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- data/standings.json; then
            echo "No change to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/standings.json
          git commit -m "Update standings snapshot [skip ci]"
          git push
