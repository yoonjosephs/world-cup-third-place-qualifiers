name: Update World Cup standings

on:
  # Ad-hoc only: trigger manually via the Actions tab ("Run workflow") or
  # `gh workflow run update-standings.yml`. There's no schedule trigger —
  # GitHub's free scheduler doesn't honor `*/5 * * * *` reliably anyway
  # (we saw hours-long cold starts and multi-hour gaps between runs in
  # practice; see README "Live data pipeline"), so a manual/on-demand
  # cadence is at least as predictable and skips the wasted contention.
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-standings
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Fetch + validate + write data/standings.json
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: node scripts/import-standings.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- data/standings.json; then
            echo "No change to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/standings.json
          git commit -m "Update standings snapshot [skip ci]"
          git push
